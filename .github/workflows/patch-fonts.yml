name: Patch WenKai Fonts

on:
  schedule:
    - cron: '17 3 * * 1' # 03:17 UTC every Monday (avoiding peak hours & NA/EU concentration)
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild and overwrite the existing release for the latest upstream version
        required: false
        default: false
        type: boolean

# Avoid concurrent duplicate runs (manual + scheduled triggers)
concurrency:
  group: patch-wenkai-fonts
  cancel-in-progress: false

# Minimal permissions (contents: write required for publishing releases)
permissions:
  contents: write

jobs:
  check-and-patch:
    runs-on: ubuntu-latest
    env:
      FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need all tags for duplicate detection

      - name: Install dependencies
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y fontforge python3 python3-pip python3-fontforge tree jq unzip zip

      - name: Get latest version
        id: fetch_release
        run: |
          set -euo pipefail
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/lxgw/LxgwWenKai/releases/latest | jq -r .tag_name)
          echo "LATEST_RELEASE=$LATEST_RELEASE" >> $GITHUB_ENV

          RELEASE_VERSION="${LATEST_RELEASE#v}"
          while [[ "$RELEASE_VERSION" == v* ]]; do
            RELEASE_VERSION="${RELEASE_VERSION#v}"
          done
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

          echo "release_exists=false" >> $GITHUB_OUTPUT

          if git tag | grep -Fxq "$LATEST_RELEASE"; then
            echo "release_exists=true" >> $GITHUB_OUTPUT

            if [ "${FORCE_RELEASE}" = "true" ]; then
              echo "Version $LATEST_RELEASE already exists, but force=true so the workflow will rebuild and overwrite it."
            else
              echo "Version $LATEST_RELEASE has already been processed."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

      - name: Stop early (already processed)
        if: steps.fetch_release.outputs.skip == 'true'
        run: echo "Nothing new, exiting early."

      - name: Delete existing release and tag
        if: steps.fetch_release.outputs.skip != 'true' && env.FORCE_RELEASE == 'true' && steps.fetch_release.outputs.release_exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete "$LATEST_RELEASE" --repo "${{ github.repository }}" --yes || true
          git push origin ":refs/tags/$LATEST_RELEASE" || true

      - name: Download fonts and show structure
        if: steps.fetch_release.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p fonts
          wget -q -O fonts/lxgw-wenkai.tar.gz https://github.com/lxgw/LxgwWenKai/releases/download/$LATEST_RELEASE/lxgw-wenkai-$LATEST_RELEASE.tar.gz
          tar -xzvf fonts/lxgw-wenkai.tar.gz -C fonts
          tree fonts -L 2 || true

      - name: Set up Font Patcher
        if: steps.fetch_release.outputs.skip != 'true'
        run: |
          set -euo pipefail
          wget -q -O FontPatcher.zip https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FontPatcher.zip
          unzip -q FontPatcher.zip -d FontPatcher
          chmod +x FontPatcher/font-patcher

      - name: Patch fonts
        if: steps.fetch_release.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir patched-fonts
          for font in fonts/**/*.ttf; do
            echo "Processing: $font"
            ./FontPatcher/font-patcher --complete --quiet --careful "$font" -o patched-fonts/
          done

      - name: Package fonts
        if: steps.fetch_release.outputs.skip != 'true'
        run: |
          set -euo pipefail
          bash .github/scripts/package-release-assets.sh "$RELEASE_VERSION" patched-fonts > asset-files.txt
          echo "Release assets:"
          cat asset-files.txt
          xargs -r ls -lh < asset-files.txt || true

      - name: Build asset file list
        if: steps.fetch_release.outputs.skip != 'true'
        id: assets
        run: |
          set -euo pipefail
          echo "Final asset list:"; cat asset-files.txt
          echo 'files<<EOF' >> $GITHUB_OUTPUT
          cat asset-files.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.fetch_release.outputs.skip != 'true'
        id: release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.LATEST_RELEASE }}
          name: ${{ env.LATEST_RELEASE }}
          overwrite_files: true
          body: |
            Release ${{ env.LATEST_RELEASE }} - LxgwWenKai Nerd Font

            This release includes all 6 font variants (Light, Regular, Medium × Proportional, Monospace) patched with Nerd Fonts.

            Assets:
            - `lxgw-wenkai-nerd-${{ env.RELEASE_VERSION }}.zip`: full bundle
            - `lxgw-wenkai-nerd-${{ env.RELEASE_VERSION }}.tar.gz`: full bundle (tar.gz)
            - `lxgw-wenkai-nerd-proportional-${{ env.RELEASE_VERSION }}.zip`: proportional only
            - `lxgw-wenkai-nerd-mono-${{ env.RELEASE_VERSION }}.zip`: monospace only

            Font files:
            - LXGWWenKaiNerdFont-Light.ttf
            - LXGWWenKaiNerdFont-Regular.ttf  
            - LXGWWenKaiNerdFont-Medium.ttf
            - LXGWWenKaiMonoNerdFont-Light.ttf
            - LXGWWenKaiMonoNerdFont-Regular.ttf
            - LXGWWenKaiMonoNerdFont-Medium.ttf

            Based on LxgwWenKai ${{ env.LATEST_RELEASE }}
          files: ${{ steps.assets.outputs.files }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger downstream publishing
        if: steps.fetch_release.outputs.skip != 'true'
        run: |
          set -euo pipefail
          for event_type in aur-publish homebrew-publish; do
            curl -X POST \
              -H "Accept: application/vnd.github.everest-preview+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{
                "event_type": "'"${event_type}"'",
                "client_payload": {
                  "tag_name": "${{ env.LATEST_RELEASE }}",
                  "release_url": "https://github.com/${{ github.repository }}/releases/tag/${{ env.LATEST_RELEASE }}"
                }
              }'
          done
