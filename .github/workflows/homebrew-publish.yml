name: Publish Homebrew Casks

on:
  release:
    types: [published]
  repository_dispatch:
    types: [homebrew-publish]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-homebrew:
    name: publish Homebrew tap
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'release' && github.event.release.draft == false && github.event.release.prerelease == false) ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'homebrew-publish') ||
      github.event_name == 'workflow_dispatch'
    env:
      TAP_REPOSITORY: Yikai-Liao/homebrew-fonts
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4

      - name: Resolve tag & version
        id: vars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: bash .github/scripts/resolve-tag.sh

      - name: Generate casks
        id: casks
        run: |
          set -euo pipefail
          mkdir -p dist/homebrew
          cd dist/homebrew

          tag='${{ steps.vars.outputs.tag }}'
          version='${{ steps.vars.outputs.pkgver }}'
          repo='${{ github.repository }}'

          proportional_asset="lxgw-wenkai-nerd-proportional-${version}.zip"
          proportional_sha=$(curl -fLs "https://github.com/${repo}/releases/download/${tag}/${proportional_asset}" | sha256sum | cut -d' ' -f1)
          bash "$GITHUB_WORKSPACE/.github/scripts/generate-homebrew-cask.sh" \
            'font-lxgw-wenkai-nerd' \
            "$version" \
            "$proportional_sha" \
            "$proportional_asset" \
            'LXGW WenKai Nerd Font' \
            'LXGW WenKai patched with Nerd Font glyphs' \
            "$tag" \
            "lxgw-wenkai-nerd-proportional-${version}" \
            'LXGWWenKaiNerdFont-Light.ttf' \
            'LXGWWenKaiNerdFont-Regular.ttf' \
            'LXGWWenKaiNerdFont-Medium.ttf'

          mono_asset="lxgw-wenkai-nerd-mono-${version}.zip"
          mono_sha=$(curl -fLs "https://github.com/${repo}/releases/download/${tag}/${mono_asset}" | sha256sum | cut -d' ' -f1)
          bash "$GITHUB_WORKSPACE/.github/scripts/generate-homebrew-cask.sh" \
            'font-lxgw-wenkai-mono-nerd' \
            "$version" \
            "$mono_sha" \
            "$mono_asset" \
            'LXGW WenKai Mono Nerd Font' \
            'LXGW WenKai Mono patched with Nerd Font glyphs' \
            "$tag" \
            "lxgw-wenkai-nerd-mono-${version}" \
            'LXGWWenKaiMonoNerdFont-Light.ttf' \
            'LXGWWenKaiMonoNerdFont-Regular.ttf' \
            'LXGWWenKaiMonoNerdFont-Medium.ttf'

          echo "cask_dir=$PWD/Casks" >> "$GITHUB_OUTPUT"

      - name: Update tap repository
        env:
          TAP_PUSH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TAP_PUSH_TOKEN:-}" ]; then
            echo "ERROR: HOMEBREW_TAP_PUSH_TOKEN is required" >&2
            exit 1
          fi

          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/${TAP_REPOSITORY}.git" "$tmpdir/tap"
          mkdir -p "$tmpdir/tap/Casks"
          cp "${{ steps.casks.outputs.cask_dir }}"/*.rb "$tmpdir/tap/Casks/"

          cd "$tmpdir/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --short -- Casks)" ]; then
            echo "No tap changes detected."
            exit 0
          fi

          git add Casks
          git commit -m "update casks for ${{ steps.vars.outputs.tag }}"
          git push origin HEAD
